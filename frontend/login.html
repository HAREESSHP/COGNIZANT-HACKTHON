<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAssist AI - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-card login-modern">
        <div class="login-icon">
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="24" r="12" stroke="#fff" stroke-width="2.5"/><path d="M12 54c0-8.837 8.059-16 18-16s18 7.163 18 16" stroke="#fff" stroke-width="2.5"/></svg>
        </div>
        <h1 class="login-title">User Login</h1>
        <form id="loginForm" class="login-form-modern">
            <div class="input-group">
                <span class="input-icon"><svg width="20" height="20" fill="none"><path d="M2 4.5l8 6 8-6" stroke="#5c6f8c" stroke-width="2"/></svg></span>
                <input type="email" id="email" placeholder="Email ID" required autocomplete="username">
            </div>
            <div class="input-group">
                <span class="input-icon"><svg width="20" height="20" fill="none"><path d="M10 14a2 2 0 100-4 2 2 0 000 4z" stroke="#5c6f8c" stroke-width="2"/><rect x="4" y="8" width="12" height="8" rx="4" stroke="#5c6f8c" stroke-width="2"/></svg></span>
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
            </div>
            <div class="login-options">
                <label class="remember-me"><input type="checkbox" id="rememberMe"> Remember me</label>
                <a href="#" id="forgotPasswordLink" class="forgot-link">Forgot Password?</a>
            </div>
            <button type="submit" class="login-btn">LOGIN</button>
            <div id="loginError" class="error"></div>
        </form>
    </div>
    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h3>Reset Password</h3>
            <form id="forgotPasswordForm">
                <input type="email" id="forgotEmail" placeholder="Enter your email" required>
                <button type="button" id="sendOtpBtn">SEND OTP</button>
                <div id="otpSection" style="display:none;">
                    <input type="text" id="otpInput" placeholder="Enter OTP" required>
                    <input type="password" id="newPassword" placeholder="New Password" required>
                    <button type="submit">RESET PASSWORD</button>
                </div>
            </form>
            <div id="forgotError" class="error"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
