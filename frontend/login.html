<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MedAssist AI</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="login-container">
        <div class="login-card">
            <form id="loginForm">
                <div id="authTitle">
                    <h1 class="app-name">MedAssist AI</h1>
                    <p class="app-tagline">Real-time Multilingual Clinical Assistant</p>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="doctor@clinic.com" required autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>
                
                <button type="submit" id="authBtn" class="login-btn">
                    Sign In
                </button>

                <div class="form-footer">
                    <p id="toggleAuth">Don't have an account? <a href="#" onclick="toggleAuth(event)">Sign Up</a></p>
                </div>
            </form>
        </div>
    </div>

    <script>
        let isLogin = true;

        function toggleAuth(e) {
            e.preventDefault();
            isLogin = !isLogin;
            const btn = document.getElementById('authBtn');
            const toggle = document.getElementById('toggleAuth');
            const title = document.querySelector('.app-tagline');

            if (isLogin) {
                btn.textContent = 'Sign In';
                toggle.innerHTML = 'Don\'t have an account? <a href="#" onclick="toggleAuth(event)">Sign Up</a>';
                title.textContent = 'Real-time Multilingual Clinical Assistant';
            } else {
                btn.textContent = 'Create Account';
                toggle.innerHTML = 'Already have an account? <a href="#" onclick="toggleAuth(event)">Sign In</a>';
                title.textContent = 'Join the future of clinical documentation';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('authBtn');
            const originalText = btn.textContent;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';
            btn.disabled = true;

            // Simulate API delay
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        });
    </script>
</body>
</html>
