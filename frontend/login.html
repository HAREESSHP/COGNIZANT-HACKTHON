<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-card">
        <h2 style="text-align:center; font-size:2rem; margin-bottom:1.5rem;">💊 Pharmacy Login</h2>
        <form id="loginForm" class="login-form-modern">
            <input type="text" id="username" name="username" placeholder="Username" required autocomplete="username">
            <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">
            <button type="submit" class="login-btn">LOGIN</button>
        </form>
        <div style="margin-top:1.5rem; text-align:center;">
            <a href="index.html" style="color:#1976d2; text-decoration:none; font-size:1rem;">&larr; Back to Home</a>
        </div>
    </div>
</body>
</html>
