<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MedAssist AI</title>
    <meta name="description" content="Sign in to MedAssist AI – Real-time multilingual clinical consultation assistant for doctors.">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <i class="fa-solid fa-stethoscope"></i>
            </div>
            <h1 class="app-name">MedAssist AI</h1>
            <p class="app-tagline" id="authTagline">Real-time Multilingual Clinical Assistant</p>

            <div class="login-error" id="loginError">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="errorMsg">Invalid email or password.</span>
            </div>

            <form id="loginForm" novalidate>
                <div class="form-group" id="nameGroup" style="display:none;">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Dr. John Smith" autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="doctor@clinic.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" minlength="6">
                </div>

                <button type="submit" id="authBtn" class="login-btn">
                    <i class="fa-solid fa-right-to-bracket"></i> Sign In
                </button>

                <div class="form-footer">
                    <p id="toggleAuthText">Don't have an account? <a href="#" id="toggleAuthLink">Sign Up</a></p>
                </div>
            </form>

            <!-- Demo hint -->
            <p style="text-align:center; margin-top:20px; font-size:11px; color:rgba(255,255,255,0.3);">
                Demo: doctor@clinic.com / password123
            </p>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000/api";
        let isLogin = true;

        const toggleAuthLink = document.getElementById('toggleAuthLink');
        const toggleAuthText = document.getElementById('toggleAuthText');
        const authBtn        = document.getElementById('authBtn');
        const authTagline    = document.getElementById('authTagline');
        const nameGroup      = document.getElementById('nameGroup');
        const loginError     = document.getElementById('loginError');
        const errorMsg       = document.getElementById('errorMsg');

        toggleAuthLink.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            loginError.style.display = 'none';

            if (isLogin) {
                authBtn.innerHTML        = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
                toggleAuthText.innerHTML = 'Don\'t have an account? <a href="#" id="toggleAuthLink">Sign Up</a>';
                authTagline.textContent  = 'Real-time Multilingual Clinical Assistant';
                nameGroup.style.display  = 'none';
            } else {
                authBtn.innerHTML        = '<i class="fa-solid fa-user-plus"></i> Create Account';
                toggleAuthText.innerHTML = 'Already have an account? <a href="#" id="toggleAuthLink">Sign In</a>';
                authTagline.textContent  = 'Join the future of clinical documentation';
                nameGroup.style.display  = 'block';
            }

            // Re-bind the new link
            document.getElementById('toggleAuthLink').addEventListener('click', arguments.callee);
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            loginError.style.display = 'none';

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Please fill in all required fields.');
                return;
            }

            authBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Authenticating...';
            authBtn.disabled  = true;

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || 'Invalid credentials.');
                }

                const data = await res.json();
                // Store session info
                sessionStorage.setItem('doctor', JSON.stringify(data.user));
                window.location.href = 'index.html';

            } catch (err) {
                showError(err.message || 'Could not reach server. Please check the backend is running.');
                authBtn.innerHTML = isLogin
                    ? '<i class="fa-solid fa-right-to-bracket"></i> Sign In'
                    : '<i class="fa-solid fa-user-plus"></i> Create Account';
                authBtn.disabled = false;
            }
        });

        function showError(msg) {
            errorMsg.textContent     = msg;
            loginError.style.display = 'flex';
            loginError.style.gap     = '8px';
            loginError.style.alignItems = 'center';
        }
    </script>
</body>
</html>
